<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Typingerz JS Runner 設定</title>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 24px;
      max-width: 960px;
      line-height: 1.5;
      color: #111;
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 0 0 16px; color: #444; }
    .hint {
      padding: 12px 14px;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      background: #fafafa;
      margin-bottom: 16px;
    }
    textarea {
      width: 100%;
      min-height: 420px;
      box-sizing: border-box;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 14px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
      resize: vertical;
    }
    .row {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 999px;
      background: #111;
      color: #fff;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }
    button.secondary {
      background: #e9e9e9;
      color: #111;
    }
    #status { color: #0a7a2f; font-weight: 600; }
    code { background: #f4f4f4; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>Typingerz Cheat Runner</h1>
  <div class="hint">
    拡張機能アイコンをクリックすると ON/OFF を切り替えます。ON のときだけ、<code>typingerz.com</code> とそのサブドメインで下の JavaScript が実行されます。
  </div>

  <textarea id="code" spellcheck="false"></textarea>

  <div class="row">
    <button id="save">保存</button>
    <button id="reset" class="secondary">初期コードに戻す</button>
    <span id="status"></span>
  </div>

  <script src="options.js"></script>
</body>
</html>
